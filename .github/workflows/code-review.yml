name: 🤖 AI Code Review

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      path:
        description: '要评审的代码路径'
        required: false
        default: '.'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests -q
      
      - name: Run AI Code Review
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python src/reviewer.py . --provider minimax --output review-report.md || true
      
      - name: Post comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('review-report.md', 'utf-8');
            const summary = report.match(/\*\*评审文件数\*\*: (\d+)/)?.[1] || '0';
            const issues = report.match(/\*\*发现问题数\*\*: (\d+)/)?.[1] || '0';
            
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 AI Code Review Report\n\n📊 **评审了 ${summary} 个文件，发现 ${issues} 个问题**\n\n<details><summary>查看完整报告</summary>\n\n${report}\n\n</details>`
            });
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          path: review-report.md
